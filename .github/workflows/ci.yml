name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  ui:
    name: UI — TypeScript & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  server:
    name: Server — TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build

  kernel:
    name: Kernel — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: 'linux'
          target: 'desktop'
          modules: qtwebengine qtwebsockets qtwebchannel
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y catch2 cmake g++ libgl1-mesa-dev
      - name: Configure CMake
        run: cmake -B build -S kernel -DBUILD_TESTING=ON
      - name: Build kernel-tests
        run: cmake --build build --target kernel-tests --parallel $(nproc)
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  docker:
    name: Docker — Sync Server Image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: false
          tags: jarvis/sync-server:${{ github.sha }}
