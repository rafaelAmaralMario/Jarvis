name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e .
          pip install pyinstaller

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build executable (skip UI, already built)
        run: python scripts/build_exe.py --skip-ui

      - name: Get version for installer
        shell: python
        run: |
          import sys; sys.path.insert(0, 'backend')
          from jarvis.version import APP_VERSION
          print(f"APP_VERSION={APP_VERSION}")
          # Write version to GITHUB_ENV
          with open(r"$env:GITHUB_ENV", "a") as f:
              f.write(f"APP_VERSION={APP_VERSION}\n")

      - name: Build installer
        run: |
          choco install innosetup --no-progress --confirm
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /dMyAppVersion="$env:APP_VERSION" scripts\installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: JARVIS ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/JARVIS-Setup-*.exe
            dist/JARVIS.exe
          generate_release_notes: true
