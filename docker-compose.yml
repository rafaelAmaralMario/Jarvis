services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jarvis-dev
    volumes:
      - .:/workspace:cached
      - vscode-extensions:/root/.vscode-server
    environment:
      DISPLAY: ${DISPLAY:-host.docker.internal:0}
    profiles:
      - dev
    stdin_open: true
    tty: true

volumes:
  vscode-extensions:
