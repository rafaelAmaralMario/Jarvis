version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jarvis-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jarvis-net

  sync-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jarvis-sync
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://jarvis:${DB_PASSWORD:-jarvis-dev}@postgres:5432/jarvis
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      WS_PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - sync
      - full
    networks:
      - jarvis-net

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jarvis-dev
    volumes:
      - .:/workspace:cached
      - vscode-extensions:/root/.vscode-server
    environment:
      DISPLAY: ${DISPLAY:-host.docker.internal:0}
      DB_PASSWORD: ${DB_PASSWORD:-jarvis-dev}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - jarvis-net
    stdin_open: true
    tty: true

networks:
  jarvis-net:
    driver: bridge

volumes:
  pgdata:
  vscode-extensions:
